<ion-content [fullscreen]="true">

    <ion-row class="ion-justify-content-center">
        <ion-col size="4">
            <ion-card>
                <ion-card-header>
                    <ion-card-title>
                        Cadastro de Veiculos        
                    </ion-card-title>
                </ion-card-header>
                <ion-card-content>
                    {{ this.veiculo.modelo }}
                    <ion-input [(ngModel)]="this.veiculo.modelo" label="Modelo" labelPlacemant="stacked"></ion-input>
                    <ion-input [()ngModel]="this.veiculo.marca" label="Marca" labelPlacemant="stacked"></ion-input>
                    <ion-input [(ngModel)]="this.veiculo.cor" label="Cor" labelPlacemant="stacked"></ion-input>
                    <ion-button color="primary" fill="outline">Adicionar</ion-button>
                </ion-card-content>
                
            </ion-card>
        </ion-col>
        <ion-col size="4"></ion-col>
    </ion-row>

</ion-content>
